<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, -apple-system, sans-serif; font-size: 13px; color: #141719; background: #fff; }

    /* 탭 */
    .tabs { display: flex; border-bottom: 1px solid #e9ecef; }
    .tab {
      flex: 1; padding: 10px; text-align: center; font-size: 12px; font-weight: 600;
      cursor: pointer; color: #848c94; border-bottom: 2px solid transparent; margin-bottom: -1px;
    }
    .tab.active { color: #141719; border-bottom-color: #141719; }

    .panel { display: none; }
    .panel.active { display: flex; flex-direction: column; height: calc(100vh - 38px); overflow-y: auto; }

    /* 공통 */
    .section { padding: 16px; }
    .section h3 { font-size: 11px; font-weight: 600; color: #848c94; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }

    .candidate-list { display: flex; flex-direction: column; gap: 6px; }
    .candidate-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border: 1px solid #e9ecef; border-radius: 8px;
    }
    .candidate-item.clickable { cursor: pointer; transition: background 0.1s; }
    .candidate-item.clickable:hover { background: #f8f9fa; }
    .candidate-info { flex: 1; min-width: 0; }
    .candidate-name { font-weight: 600; font-size: 13px; }
    .candidate-desc { font-size: 11px; color: #848c94; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .status-badge {
      font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; white-space: nowrap; flex-shrink: 0;
    }
    .status-in-progress { background: #e7f4fd; color: #2b96ed; }
    .status-pending { background: #fffbeb; color: #d97706; }
    .status-completed { background: #ecfdf5; color: #27ab86; }

    /* 승인 탭 */
    .approve-card {
      border: 1px solid #e9ecef; border-radius: 10px; padding: 14px; margin-bottom: 8px;
    }
    .approve-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .approve-card-name { font-weight: 700; font-size: 14px; }
    .approve-card-sources { font-size: 11px; color: #848c94; margin-bottom: 10px; }
    .similarity-bar { height: 4px; background: #e9ecef; border-radius: 99px; margin-bottom: 10px; }
    .similarity-fill { height: 100%; border-radius: 99px; background: #141719; }

    .btn-approve {
      width: 100%; padding: 8px; border-radius: 6px; border: none;
      font-size: 12px; font-weight: 600; cursor: pointer;
      background: #141719; color: white; transition: opacity 0.1s;
    }
    .btn-approve:hover { opacity: 0.85; }
    .btn-approve:disabled { background: #ced4da; cursor: not-allowed; }
    .btn-approve.done { background: #27ab86; }

    /* GitHub 설정 */
    .settings { padding: 12px 16px; border-top: 1px solid #e9ecef; }
    .settings summary { font-size: 11px; font-weight: 600; color: #848c94; cursor: pointer; margin-bottom: 8px; }
    .input-group { margin-bottom: 8px; }
    .input-group label { font-size: 11px; color: #495056; display: block; margin-bottom: 4px; }
    .input-group input {
      width: 100%; padding: 7px 10px; border: 1px solid #e9ecef; border-radius: 6px;
      font-size: 12px; font-family: monospace; color: #141719;
    }
    .input-group input:focus { outline: none; border-color: #141719; }

    /* 생성 탭 옵션 */
    .options { padding: 10px 16px; border-top: 1px solid #e9ecef; display: flex; flex-direction: column; gap: 8px; }
    .option-row { display: flex; align-items: center; justify-content: space-between; }
    .option-label { font-size: 12px; color: #495056; }
    .toggle {
      position: relative; width: 36px; height: 20px;
      background: #ced4da; border-radius: 99px; cursor: pointer; border: none; transition: background 0.2s;
    }
    .toggle.on { background: #141719; }
    .toggle::after {
      content: ''; position: absolute; width: 16px; height: 16px;
      background: white; border-radius: 99px; top: 2px; left: 2px; transition: left 0.2s;
    }
    .toggle.on::after { left: 18px; }

    .actions { padding: 12px 16px; border-top: 1px solid #e9ecef; display: flex; flex-direction: column; gap: 8px; }
    .btn {
      width: 100%; padding: 10px; border-radius: 8px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.1s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #141719; color: white; }
    .btn-secondary { background: #f1f3f5; color: #141719; }

    .log {
      padding: 8px 16px 12px; font-size: 11px; color: #848c94; min-height: 32px; line-height: 1.5;
    }
    .pr-link { color: #2b96ed; text-decoration: underline; cursor: pointer; font-size: 11px; }
  </style>
</head>
<body>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('sync')">생성</div>
    <div class="tab" onclick="switchTab('approve')">승인 → DS 편입</div>
  </div>

  <!-- 생성 탭 -->
  <div class="panel active" id="panel-sync">
    <div class="section">
      <h3>생성할 컴포넌트 선택</h3>
      <div class="candidate-list" id="syncList"></div>
    </div>
    <div class="options">
      <div class="option-row">
        <span class="option-label">후보군 현황 오버뷰 생성</span>
        <button class="toggle on" onclick="toggleOption('overview', this)"></button>
      </div>
      <div class="option-row">
        <span class="option-label">토큰 노트 포함</span>
        <button class="toggle on" onclick="toggleOption('tokenNote', this)"></button>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="runSync()">선택한 컴포넌트 생성</button>
      <button class="btn btn-secondary" onclick="selectAll()">전체 선택</button>
    </div>
    <div class="log" id="syncLog"></div>
  </div>

  <!-- 승인 탭 -->
  <div class="panel" id="panel-approve">
    <div class="section" style="padding-bottom:8px">
      <h3>DS 편입 승인</h3>
      <p style="font-size:11px;color:#848c94;margin-bottom:12px;line-height:1.5">
        디자인 완성된 후보군을 DS 정식 컴포넌트로 편입합니다.<br>
        버튼 클릭 → GitHub PR 자동 생성 → 개발자 리뷰 후 merge
      </p>
      <div id="approveList"></div>
    </div>

    <details class="settings" id="ghSettings" open>
      <summary>⚙️ GitHub 설정 (최초 1회 입력)</summary>
      <div class="input-group">
        <label>Personal Access Token</label>
        <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx" oninput="saveSettings()" />
      </div>
      <div class="input-group">
        <label>Owner / Repo</label>
        <input type="text" id="ghRepo" placeholder="myorg/mrt-ds-poc" oninput="saveSettings()" />
      </div>
    </details>

    <div class="log" id="approveLog"></div>
  </div>

  <script>
    const candidates = [
      { id: 'chip', name: 'Chip', desc: '필터/카테고리 선택 칩', status: 'in-progress', similarity: 0.92, sources: ['chip/FilterChip.tsx', 'chip/CategoryChip.tsx'] },
      { id: 'badge', name: 'Badge', desc: '상품 카드 상단 뱃지', status: 'in-progress', similarity: 0.88, sources: ['badge/StatusBadge.tsx', 'badge/CountBadge.tsx'] },
      { id: 'input', name: 'Input', desc: 'TextInput/SearchInput 통합', status: 'pending', similarity: 0.83, sources: ['input/TextInput.tsx', 'input/SearchInput.tsx'] },
      { id: 'card', name: 'Card', desc: '상품/호텔/항공 카드', status: 'pending', similarity: 0.76, sources: ['card/ProductCard.tsx', 'card/HotelCard.tsx'] },
      { id: 'modal', name: 'Modal', desc: 'BottomSheet/Dialog/Drawer', status: 'pending', similarity: 0.71, sources: ['modal/BottomSheet.tsx', 'modal/Dialog.tsx'] },
    ];

    const options = { overview: true, tokenNote: true };
    const selected = new Set(['chip', 'badge']);
    const approved = new Set();

    try {
      document.getElementById('ghToken').value = localStorage.getItem('ghToken') || '';
      document.getElementById('ghRepo').value = localStorage.getItem('ghRepo') || '';
    } catch(e) {}

    function saveSettings() {
      localStorage.setItem('ghToken', document.getElementById('ghToken').value);
      localStorage.setItem('ghRepo', document.getElementById('ghRepo').value);
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0) === (tab === 'sync'));
      });
      document.getElementById('panel-sync').classList.toggle('active', tab === 'sync');
      document.getElementById('panel-approve').classList.toggle('active', tab === 'approve');
    }

    function toggleOption(key, btn) {
      options[key] = !options[key];
      btn.classList.toggle('on');
    }

    function selectAll() {
      candidates.forEach(c => selected.add(c.id));
      renderSync();
    }

    // 생성 탭 렌더
    function renderSync() {
      document.getElementById('syncList').innerHTML = candidates.map(c => {
        const isSelected = selected.has(c.id);
        return `
        <div class="candidate-item clickable" onclick="toggleSelect('${c.id}')" style="margin-bottom:6px">
          <div style="width:16px;height:16px;border-radius:4px;border:2px solid ${isSelected ? '#141719' : '#ced4da'};background:${isSelected ? '#141719' : 'white'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
            ${isSelected ? '<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>' : ''}
          </div>
          <div class="candidate-info">
            <div class="candidate-name">${c.name}</div>
            <div class="candidate-desc">${c.desc}</div>
          </div>
          <span class="status-badge status-${c.status}">${c.status}</span>
        </div>
      `}).join('');
    }

    function toggleSelect(id) {
      if (selected.has(id)) selected.delete(id); else selected.add(id);
      renderSync();
    }

    // 승인 탭 렌더
    function renderApprove() {
      const approvable = candidates.filter(c => c.status === 'in-progress' || c.status === 'pending');
      document.getElementById('approveList').innerHTML = approvable.map(c => {
        const isDone = approved.has(c.id);
        return `
        <div class="approve-card">
          <div class="approve-card-header">
            <span class="approve-card-name">${c.name}</span>
            <span class="status-badge status-${c.status}">${c.status}</span>
          </div>
          <div class="approve-card-sources">${c.sources.join(' + ')}</div>
          <div class="similarity-bar">
            <div class="similarity-fill" style="width:${c.similarity * 100}%"></div>
          </div>
          <button
            class="btn-approve ${isDone ? 'done' : ''}"
            onclick="approveCandidate('${c.id}')"
            ${isDone ? 'disabled' : ''}
          >
            ${isDone ? '✅ PR 생성됨' : `DS 편입 PR 생성 → ${c.name}`}
          </button>
        </div>
      `}).join('');
    }

    function runSync() {
      if (selected.size === 0) { setLog('syncLog', '⚠️ 컴포넌트를 선택해주세요'); return; }
      setLog('syncLog', '🔨 생성 중...');
      parent.postMessage({ pluginMessage: { type: 'sync', components: [...selected], options } }, '*');
    }

    function approveCandidate(id) {
      const token = document.getElementById('ghToken').value.trim();
      const repoField = document.getElementById('ghRepo').value.trim();

      if (!token) { setLog('approveLog', '⚠️ GitHub Token을 입력해주세요'); document.getElementById('ghSettings').open = true; return; }
      if (!repoField || !repoField.includes('/')) { setLog('approveLog', '⚠️ Owner/Repo 형식으로 입력해주세요 (예: myorg/mrt-ds-poc)'); document.getElementById('ghSettings').open = true; return; }

      const [owner, repo] = repoField.split('/');
      setLog('approveLog', `🔨 ${id} PR 생성 중...`);

      parent.postMessage({
        pluginMessage: { type: 'approve', candidateId: id, githubToken: token, githubOwner: owner, githubRepo: repo }
      }, '*');
    }

    function setLog(id, msg) {
      document.getElementById(id).innerHTML = msg;
    }

    window.onmessage = (e) => {
      const msg = e.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'done') setLog('syncLog', `✅ ${msg.message}`);
      if (msg.type === 'progress') {
        setLog('syncLog', `🔨 ${msg.message}`);
        setLog('approveLog', `🔨 ${msg.message}`);
      }
      if (msg.type === 'error') {
        setLog('syncLog', `❌ ${msg.message}`);
        setLog('approveLog', `❌ ${msg.message}`);
      }
      if (msg.type === 'approved') {
        approved.add(msg.candidateId);
        renderApprove();
        setLog('approveLog', `✅ PR 생성 완료! <a class="pr-link" onclick="figma.openExternal('${msg.prUrl}')">PR 열기 →</a>`);
      }
    };

    renderSync();
    renderApprove();
  </script>
</body>
</html>
